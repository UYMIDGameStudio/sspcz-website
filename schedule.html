    <div class="tab-btn" data-day="3" role="button" tabindex="0">10月4日</div>

<script>
  var DAYS = {
    1: [
      { time: '09:00 – 09:40', kind: '开幕 OPENING', title: '开幕式', desc: '组委会致辞，介绍大会宗旨、主题「变与不变」与本届安排。' },
      { time: '09:40 – 12:00', kind: '讲演 PAPERS', title: '学生论文讲演（第一组）', desc: '发言论文作者进行 25–30 分钟讲演，嘉宾点评后开放 15–20 分钟自由讨论。' },
      { time: '13:30 – 16:00', kind: '讲演 PAPERS', title: '学生论文讲演（第二组）', desc: '发言论文作者进行 25–30 分钟讲演，嘉宾点评后开放 15–20 分钟自由讨论。' },
      { time: '16:15 – 17:15', kind: '讲座 LECTURE', title: '嘉宾专题讲座（一）', desc: '嘉宾围绕小组主题开设 30–40 分钟讲座，讲座后自由交流。' },
    ],
    2: [
      { time: '09:00 – 12:00', kind: '讲演 PAPERS', title: '学生论文讲演（第三组）', desc: '发言论文作者进行 25–30 分钟讲演，嘉宾点评后开放 15–20 分钟自由讨论。' },
      { time: '13:30 – 15:30', kind: '讲演 PAPERS', title: '学生论文讲演（第四组）', desc: '发言论文作者进行 25–30 分钟讲演，嘉宾点评后开放 15–20 分钟自由讨论。' },
      { time: '15:45 – 16:45', kind: '讲座 LECTURE', title: '嘉宾专题讲座（二）', desc: '嘉宾围绕小组主题开设 30–40 分钟讲座，讲座后自由交流。' },
    ],
    3: [
      { time: '09:00 – 09:30', kind: '说明 BRIEFING', title: '哲学黑客马拉松 · 开题', desc: '公布议题与规则，参与者分组。' },
      { time: '09:30 – 17:00', kind: '协作 HACKATHON', title: '哲学黑客马拉松', desc: '小组以"短时高强度协作"模式共同攻克哲学与伦理议题，在互主体性的对话中推进方案。' },
    ],
    4: [
      { time: '09:00 – 11:30', kind: '展示 DEMO', title: '黑客马拉松成果展示', desc: '各小组展示成果，嘉宾与全体与会者点评交流。' },
      { time: '13:30 – 15:00', kind: '颁奖 AWARDS', title: '颁奖典礼', desc: '颁发最佳写作奖、最佳演讲奖、最佳主题奖、最佳原创奖。' },
      { time: '15:00 – 16:00', kind: '闭幕 CLOSING', title: '闭幕式', desc: '大会总结与致谢，合影留念。' },
    ],
  };

  var tabsEl = document.getElementById('tabs');
  var eventsEl = document.getElementById('events');

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  function renderDay(day) {
    var rows = DAYS[day].map(function (ev) {
      return (
        '<div class="ev-row" style="display:grid;grid-template-columns:180px 200px 1fr;gap:24px;padding:26px 32px;border-bottom:1px solid #e0e6e9;background:#f7f9fa;align-items:baseline">' +
          '<div style="font-family:\'Times New Roman\',Times,serif;font-size:16px;color:#3e7ca6;letter-spacing:1px">' + escapeHtml(ev.time) + '</div>' +
          '<div style="font-size:12px;color:#8194a3;letter-spacing:2px;padding-top:2px">' + escapeHtml(ev.kind) + '</div>' +
          '<div>' +
            '<div style="font-family:\'Noto Serif SC\',serif;font-size:19px;color:#122736">' + escapeHtml(ev.title) + '</div>' +
            '<div style="font-size:13.5px;color:#5f7181;margin-top:6px;line-height:1.8">' + escapeHtml(ev.desc) + '</div>' +
          '</div>' +
        '</div>'
      );
    });
    eventsEl.innerHTML = rows.join('');
  }

  tabsEl.addEventListener('click', function (e) {
    var btn = e.target.closest('.tab-btn');
    if (!btn) return;
    tabsEl.querySelectorAll('.tab-btn').forEach(function (b) { b.classList.remove('active'); });
    btn.classList.add('active');
    renderDay(btn.getAttribute('data-day'));
  });

  tabsEl.addEventListener('keydown', function (e) {
    if ((e.key === 'Enter' || e.key === ' ') && e.target.classList.contains('tab-btn')) {
      e.preventDefault();
      e.target.click();
    }
  });

  renderDay(1);
</script>
<script src="assets/lang.js"></script>
</body>
