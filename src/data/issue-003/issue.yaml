      en: "Experts and scholars give 30–40 minute lectures around the theme \"Change & Invariance\", with open exchange afterwards."
  - id: hackathon
    kicker:
      zh: "哲学黑客马拉松"
      en: "Phil-Hackathon"
    name:
      zh: "哲学黑客马拉松"
      en: "Philosophy Hackathon"
    summary:
      zh: "借用「短时高强度协作」模式的跨学科实践实验，小组共同攻克哲学与伦理议题。"
      en: "A cross-disciplinary experiment borrowing the short, intense collaboration model: teams tackle philosophical and ethical problems together."

participantCategories:
  - id: presenting
    name:
      zh: "发言成员"
      en: "Presenting Members"
    description:
      zh: "从投稿中评选出的「发言论文」作者，在大会上讲演自己的研究成果，接受嘉宾与同学的点评。"
      en: "Authors of presenting papers selected from submissions, who present their research at the conference and receive comments from guests and peers."
  - id: attending
    name:
      zh: "列席成员"
      en: "Attending Members"
    description:
      zh: "递交论文入选「列席论文」的同学，全程参会并坐于大会前列，论文收入本届大会论文集。"
      en: "Students whose submissions are selected as attending papers. They attend the full conference in the front rows, and their papers are included in this session's proceedings."
  - id: auditing
    name:
      zh: "旁听成员"
      en: "Auditing Members"
    description:
      zh: "对哲学感兴趣的中学生及任何年龄阶段的人，可全程参与提问、讲座、读书会与学者交流。"
      en: "Secondary school students — and curious people of any age — interested in philosophy. Open to all Q&A sessions, lectures, reading groups and exchanges with scholars."
  - id: guests
    name:
      zh: "嘉宾"
      en: "Guests"
    description:
      zh: "各专业领域的专家学者，担任论文点评与专题讲座，带来前沿的学术动态与哲学思考。"
      en: "Experts and scholars from various fields who comment on papers and deliver lectures, bringing current scholarship and philosophical reflection."
